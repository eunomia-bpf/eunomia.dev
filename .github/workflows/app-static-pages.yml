name: Deploy Static App

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - trigger-tutorial-sync
      - trigger-document-sync
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: static-app-pages-${{ github.ref }}
  queue: max

jobs:
  sync-external-docs:
    if: github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    outputs:
      synced: ${{ steps.sync.outputs.synced }}
      site_sha: ${{ steps.commit.outputs.site_sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Sync external documentation
        id: sync
        env:
          DISPATCH_TYPE: ${{ github.event.action }}
          SOURCE_REPO: ${{ github.event.client_payload.source_repo }}
          SOURCE_SHA: ${{ github.event.client_payload.source_sha }}
        run: |
          set -euo pipefail
          echo "synced=false" >> "$GITHUB_OUTPUT"
          case "${DISPATCH_TYPE}" in
            trigger-document-sync)
              make sync-external-docs
              ;;
            trigger-tutorial-sync)
              if [ "${SOURCE_REPO}" != "eunomia-bpf/bpf-developer-tutorial" ]; then
                echo "Invalid tutorial source repository: ${SOURCE_REPO}" >&2
                exit 1
              fi
              if [[ ! "${SOURCE_SHA}" =~ ^[0-9a-f]{40}$ ]]; then
                echo "Invalid tutorial source commit: ${SOURCE_SHA}" >&2
                exit 1
              fi

              source_url="https://github.com/${SOURCE_REPO}.git"
              git init --quiet tutorial-source
              git -C tutorial-source remote add origin "${source_url}"
              git -C tutorial-source fetch --quiet --depth=1 origin refs/heads/main
              fetched_sha="$(git -C tutorial-source rev-parse FETCH_HEAD)"
              if [ "${SOURCE_SHA}" != "${fetched_sha}" ]; then
                echo "Skipping stale tutorial sync ${SOURCE_SHA}; main is ${fetched_sha}."
                exit 0
              fi

              git -C tutorial-source checkout --quiet --detach FETCH_HEAD
              make clean
              mv tutorial-source tutorial
              make docs/CNAME
              ;;
            *)
              echo "Unsupported repository_dispatch type: ${DISPATCH_TYPE}" >&2
              exit 1
              ;;
          esac
          echo "synced=true" >> "$GITHUB_OUTPUT"

      - name: Commit synced documentation
        id: commit
        if: steps.sync.outputs.synced == 'true'
        env:
          SOURCE_REPO: ${{ github.event.client_payload.source_repo }}
          SOURCE_SHA: ${{ github.event.client_payload.source_sha }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "External documentation is already up to date."
            echo "site_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -n "${SOURCE_SHA}" ]; then
            git commit -m "sync external docs from ${SOURCE_REPO}@${SOURCE_SHA}"
          else
            git commit -m "sync external docs"
          fi
          git push origin HEAD:main
          echo "site_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  deploy-static-app:
    needs: sync-external-docs
    if: >-
      ${{
        always() &&
        (
          github.event_name != 'repository_dispatch' ||
          (
            needs.sync-external-docs.result == 'success' &&
            needs.sync-external-docs.outputs.synced == 'true'
          )
        )
      }}
    runs-on: ubuntu-latest
    env:
      DEPLOY_SHA: ${{ github.event_name == 'repository_dispatch' && needs.sync-external-docs.outputs.site_sha || github.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.DEPLOY_SHA }}

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            app/package-lock.json
            test/package-lock.json

      - name: Install browser audit dependencies
        working-directory: test
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Verify static export
        working-directory: app
        run: |
          npm ci
          npm run verify

      - name: Build production static export
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        working-directory: app
        env:
          NEXT_PUBLIC_SITE_URL: https://eunomia.dev
        run: npm run build

      - name: Assert production URLs
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: |
          if grep -R "127.0.0.1\|localhost" app/out/sitemap.xml app/out/robots.txt app/out/feed.xml app/out/index.html; then
            echo "Production export contains local URLs" >&2
            exit 1
          fi
          grep -q "https://eunomia.dev/sitemap.xml" app/out/robots.txt
          grep -q "https://eunomia.dev/" app/out/sitemap.xml

      - name: Publish static export to new branch
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          git fetch origin new
          rm -rf ../static-branch
          git worktree add --detach ../static-branch origin/new
          find ../static-branch -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a app/out/. ../static-branch/
          cd ../static-branch
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Static export is already up to date on new."
            exit 0
          fi
          git commit -m "deploy static app for ${DEPLOY_SHA}"
          git push origin HEAD:new

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: app/out

      - name: Deploy to GitHub Pages
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/deploy-pages@v5
