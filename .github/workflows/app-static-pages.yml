name: Deploy Static App

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - trigger-tutorial-sync
      - trigger-document-sync
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: static-app-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-static-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            app/package-lock.json
            test/package-lock.json

      - name: Install browser audit dependencies
        working-directory: test
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Verify static export
        working-directory: app
        run: |
          npm ci
          npm run verify

      - name: Build production static export
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        working-directory: app
        env:
          NEXT_PUBLIC_SITE_URL: https://eunomia.dev
        run: npm run build

      - name: Assert production URLs
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: |
          if grep -R "127.0.0.1\|localhost" app/out/sitemap.xml app/out/robots.txt app/out/feed.xml app/out/index.html; then
            echo "Production export contains local URLs" >&2
            exit 1
          fi
          grep -q "https://eunomia.dev/sitemap.xml" app/out/robots.txt
          grep -q "https://eunomia.dev/" app/out/sitemap.xml

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: app/out

      - name: Deploy to GitHub Pages
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/deploy-pages@v5
