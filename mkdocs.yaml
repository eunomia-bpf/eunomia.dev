    capabilities_title:
      en: What Eunomia Provides
      zh: Eunomia 提供什么
    capabilities_intro:
      en: Runtime infrastructure, public resources, and AI agent systems define the work behind Eunomia.
      zh: Eunomia 的工作集中在 runtime infrastructure、公开资源和 AI agent systems。
    capabilities:
      - key: runtime-extension
        eyebrow:
          en: Runtime extension
          zh: Runtime extension
        title:
          en: Move eBPF beyond kernel-only workflows
          zh: 让 eBPF 不只停留在内核工作流里
        description:
          en: Run, instrument, and extend systems with userspace execution paths, GPU paths, JIT/AOT support, and deployment models that fit production tooling.
          zh: 通过 userspace execution、GPU paths、JIT/AOT 支持和部署模型，把 eBPF 扩展到生产工具链可以直接使用的系统路径。
      - key: resources
        eyebrow:
          en: Resources
          zh: Resources
        title:
          en: Publish reusable tutorials, docs, blogs, and papers
          zh: 发布可复用的教程、文档、博客和论文
        description:
          en: Maintain executable tutorials, documentation entry points, technical writing, and research artifacts for eBPF builders.
          zh: 面向 eBPF 开发者维护可执行教程、文档入口、技术文章和研究产物。
      - key: ai-agents
        eyebrow:
          en: AI Agents
          zh: AI Agents
        title:
          en: Observe and harness AI agents at the system layer
          zh: 在系统层观测并管控 AI agent
        description:
          en: Zero-instrumentation, framework-agnostic visibility into what agents actually do — plus runtime guardrails on what they are allowed to do.
          zh: 零插桩、框架无关地看清 agent 真正做了什么，并对它能做什么设定运行时 guardrail。
    projects_title:
      en: Projects
      zh: 项目
    projects_intro:
      en: Open-source platform projects and public resources grouped by how people use them.
      zh: 按使用方式组织的开源平台项目和公开资源。
    project_groups:
      - key: platform
        title:
          en: Platform
          zh: 平台
        intro:
          en: Execution engines, toolchains, runtime components, and low-level extension paths.
          zh: 执行引擎、工具链、runtime 组件和底层扩展路径。
        project_keys: [bpftime, gpu_ext, llvmbpf, eunomia-bpf, wasm-bpf]
      - key: ai-agents
        title:
          en: AI Agents
