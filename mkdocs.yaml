plugins:
  - meta
  - social
  - awesome-pages
  - blog:
      archive: false
      categories: false
      pagination: false
      blog_toc: true
  - search
  - tags
  - exclude:
      glob:
        - tutorials/third_party*
  - i18n:
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: zh
          name: 简体中文
          build: true
          nav_translations:
            Getting Started: 开始
            Support: 支持
            Quick Start: 快速开始
            Architecture: 项目架构
            Installation: 安装
            From source: 从源代码
            Known Issues: 已知问题
            Examples: 示例
            Blogs: 博客
            Misc: 其他
            Tutorials: 教程
            Introduction: 简介
            README: 文档
            Home: 主页
            Documents: 文档
            ecli with docker: 在docker中使用ecli
            ecosystem: 生态
  - git-revision-date-localized:
      enable_creation_date: true
  - git-authors
