      zh: Eunomia 的工作集中在 runtime infrastructure、公开资源和 AI agent systems。
    capabilities:
      - key: runtime-extension
        eyebrow:
          en: Runtime extension
          zh: Runtime extension
        title:
          en: Move eBPF beyond kernel-only workflows
          zh: 让 eBPF 不只停留在内核工作流里
        description:
          en: Run, instrument, and extend systems with userspace execution paths, JIT/AOT support, and deployment models that fit production tooling.
          zh: 通过 userspace execution、JIT/AOT 支持和部署模型，把 eBPF 扩展到生产工具链可以直接使用的系统路径。
      - key: resources
        eyebrow:
          en: Resources
          zh: Resources
        title:
          en: Publish reusable tutorials, docs, blogs, and papers
          zh: 发布可复用的教程、文档、博客和论文
        description:
          en: Maintain executable tutorials, documentation entry points, technical writing, and research artifacts for eBPF builders.
          zh: 面向 eBPF 开发者维护可执行教程、文档入口、技术文章和研究产物。
      - key: ai-agents
        eyebrow:
          en: AI Agents
          zh: AI Agents
        title:
          en: Make agent behavior observable and controllable
          zh: 让 agent 行为可观测、可控制
        description:
          en: Monitor agents at system boundaries, correlate process and network behavior, and protect workflows that rely on checkpoint and restore.
          zh: 在系统边界监控 agent，关联进程和网络行为，并保护依赖 checkpoint/restore 的工作流。
    projects_title:
      en: Projects
      zh: 项目
    projects_intro:
      en: Open-source platform projects and public resources grouped by how people use them.
      zh: 按使用方式组织的开源平台项目和公开资源。
    project_groups:
      - key: platform
        title:
          en: Platform
          zh: 平台
        intro:
          en: Execution engines, toolchains, runtime components, and low-level extension paths.
          zh: 执行引擎、工具链、runtime 组件和底层扩展路径。
        project_keys: [bpftime, llvmbpf, eunomia-bpf, wasm-bpf]
      - key: resources
        title:
          en: Resources
          zh: 资源
        intro:
          en: Tutorials, documentation, blog posts, and research papers for eBPF builders.
          zh: 面向 eBPF 开发者的教程、文档、博客和研究论文。
        project_keys: [bpf-developer-tutorial, docs, blog, papers]
      - key: ai-agents
        title:
          en: AI Agents
          zh: AI Agents
        intro:
          en: Tracing, observability, and safety work for AI agent systems.
          zh: 面向 AI agent 系统的 tracing、observability 和安全研究。
