  home:
    hero:
      kicker:
        en: Open-source infrastructure
        zh: 开源基础设施
      title:
        en: Eunomia
        zh: Eunomia
      summary:
        en: Open-source eBPF infrastructure for runtime extension and AI Agents.
        zh: 面向 runtime extension 和 AI Agents 的开源 eBPF 基础设施。
