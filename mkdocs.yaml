  home:
    projects_title:
      en: Projects
      zh: 项目
    projects_intro:
      en: Open-source projects, research artifacts, and documentation entry points maintained by eunomia-bpf.
      zh: eunomia-bpf 维护的开源项目、研究产物和文档入口。
    projects:
      - key: bpftime
        title: bpftime
        tag:
          en: Runtime
          zh: Runtime
        href: /bpftime/
        image: /_content-assets/docs/bpftime/documents/bpftime.png
        image_alt: bpftime
        description:
          en: A high-performance userspace eBPF runtime and extension framework for uprobes, USDT, syscall, XDP, GPU, and related workflows.
          zh: 面向 userspace 的高性能 eBPF runtime 和扩展框架，覆盖 uprobe、USDT、syscall、XDP、GPU 等工作流。
        links:
          - label: Docs
            label_zh: 文档
            href: /bpftime/
          - label: GitHub
            href: https://github.com/eunomia-bpf/bpftime
          - label: OSDI 2025
            href: https://www.usenix.org/conference/osdi25/presentation/zheng-yusheng
      - key: bpf-developer-tutorial
        title: bpf-developer-tutorial
        tag:
          en: Learn
          zh: Learn
        href: /tutorials/
        image: /ebpf_arch.png
        image_alt: eBPF tutorial structure
        description:
          en: Executable eBPF tutorials from hello world to sched-ext, networking, userspace tracing, and GPU scenarios.
          zh: 从 hello world 到 sched-ext、网络、userspace tracing 和 GPU 场景的可执行 eBPF 教程。
        links:
          - label: Tutorials
            label_zh: 教程
            href: /tutorials/
          - label: GitHub
            href: https://github.com/eunomia-bpf/bpf-developer-tutorial
      - key: eunomia-bpf
        title: eunomia-bpf
        tag:
          en: Toolchain
          zh: 工具链
        href: /eunomia-bpf/
        image: /_content-assets/docs/assets/logo.png
        image_alt: eunomia-bpf
        description:
          en: Build, package, distribute, and run eBPF programs with JSON metadata and WebAssembly OCI workflows.
          zh: 使用 JSON metadata 和 WebAssembly OCI workflow 构建、打包、分发并运行 eBPF 程序。
        links:
          - label: Docs
            label_zh: 文档
            href: /eunomia-bpf/
          - label: GitHub
            href: https://github.com/eunomia-bpf/eunomia-bpf
          - label: Apsara 2022
            href: https://www.alibabacloud.com/blog/eunomia-bpf-the-lightweight-development-framework-for-ebpf-and-webassembly-is-now-available_599688
      - key: GPTtrace
        title: GPTtrace
        tag:
          en: AI tracing
          zh: AI tracing
        href: /GPTtrace/
        image: /_content-assets/docs/GPTtrace/doc/trace.png
        image_alt: GPTtrace
        description:
          en: Generate eBPF tracing programs with natural language and use LLMs to explore Linux kernel behavior.
          zh: 用自然语言生成 eBPF tracing 程序，并借助 LLM 探索 Linux 内核行为。
        links:
          - label: Docs
            label_zh: 文档
            href: /GPTtrace/
          - label: GitHub
            href: https://github.com/eunomia-bpf/GPTtrace
          - label: eBPF 2024
            href: https://dl.acm.org/doi/10.1145/3672197.3673434
      - key: agentsight
        title: AgentSight
        tag:
          en: Agent observability
          zh: Agent observability
        href: /GPTtrace/agentsight/
        image: /_content-assets/docs/blog/posts/imgs/arch.png
        image_alt: AgentSight architecture
        description:
          en: Zero-instrumentation LLM and AI agent observability with eBPF, process monitoring, and TLS traffic correlation.
          zh: 基于 eBPF、进程监控和 TLS traffic correlation 的零插桩 LLM 与 AI agent 可观测性。
        links:
          - label: Docs
            label_zh: 文档
            href: /GPTtrace/agentsight/
          - label: GitHub
            href: https://github.com/eunomia-bpf/agentsight
          - label: arXiv 2508.02736
            href: https://arxiv.org/abs/2508.02736
      - key: llvmbpf
        title: llvmbpf
        tag:
          en: Runtime core
          zh: Runtime core
        href: /bpftime/llvmbpf/
        image: /llvmbpf.png
        image_alt: llvmbpf
        description:
          en: A userspace eBPF VM with LLVM JIT/AOT support, used as the compiler and execution core of bpftime.
          zh: 支持 LLVM JIT/AOT 的 userspace eBPF VM，也是 bpftime 的编译和执行核心。
        links:
          - label: Docs
            label_zh: 文档
            href: /bpftime/llvmbpf/
          - label: GitHub
            href: https://github.com/eunomia-bpf/llvmbpf
          - label: Blog
            href: /blogs/llvmbpf/
      - key: wasm-bpf
        title: wasm-bpf
        tag:
          en: WebAssembly
          zh: WebAssembly
        href: /wasm-bpf/
        image: /_content-assets/docs/img/wasm-bpf-no-bcc.png
        image_alt: wasm-bpf
        description:
          en: WebAssembly-based eBPF tooling and runtime support for lightweight sandboxing and cloud native deployment.
          zh: 基于 WebAssembly 的 eBPF 工具链和运行时支持，适合轻量级沙箱和云原生部署场景。
        links:
          - label: Docs
            label_zh: 文档
            href: /wasm-bpf/
          - label: GitHub
            href: https://github.com/eunomia-bpf/wasm-bpf
          - label: KubeCon NA 2023
            href: https://sched.co/1R2uf
      - key: ACRFence
        title: ACRFence
        tag:
          en: Agent safety
          zh: Agent safety
        href: /blog/2026/05/21/acrfence-preventing-semantic-rollback-attacks-in-agent-checkpoint-restore/
        image: /_content-assets/docs/blog/posts/imgs/acrfence/fig-sequence.png
        image_alt: ACRFence checkpoint restore sequence
        description:
          en: Research on semantic rollback attacks in agent checkpoint/restore workflows and intent-aware fencing.
          zh: 关于 agent checkpoint/restore 工作流中语义回滚攻击和 intent-aware fencing 的研究。
        links:
          - label: Blog
            label_zh: 博客
            href: /blog/2026/05/21/acrfence-preventing-semantic-rollback-attacks-in-agent-checkpoint-restore/
          - label: arXiv 2603.20625
            href: https://arxiv.org/abs/2603.20625
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/eunomia-bpf
    - icon: fontawesome/solid/paper-plane
      link: mailto:yunwei356@gmail.com
  generator: false
  analytics: 
    provider: google
    property: G-1YVMXGL0MY
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/emoticon-happy-outline
          name: This page was helpful
          data: 1
          note: >-
            Thanks for your feedback!
        - icon: material/emoticon-sad-outline
          name: This page could be improved
          data: 0
          note: >- 
            Thanks for your feedback! Help us improve this page by
            using our <a href="https://github.com/orgs/eunomia-bpf/discussions" target="_blank" rel="noopener">Github discussion</a>.
  alternate:
    - name: English
      link: /en/ 
      lang: en
    - name: Chinese
      link: /zh/
      lang: zh
plugins:
  - meta
  - social
  - awesome-pages
  - blog:
      archive: false
      categories: false
      pagination: false
      blog_toc: true
  - search
  - tags
  - exclude:
      glob:
        - tutorials/third_party*
  - i18n:
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: zh
          name: 简体中文
          build: true
          nav_translations:
            Getting Started: 开始
            Support: 支持
            Quick Start: 快速开始
            Architecture: 项目架构
            Installation: 安装
            From source: 从源代码
            Known Issues: 已知问题
            Examples: 示例
            Blogs: 博客
            Misc: 其他
            Tutorials: 教程
            Introduction: 简介
            README: 文档
            Home: 主页
            Documents: 文档
            ecli with docker: 在docker中使用ecli
            ecosystem: 生态
  - git-revision-date-localized:
      enable_creation_date: true
  - git-authors
