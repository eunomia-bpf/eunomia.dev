use_case_groups:
  - key: llm-observability
    eyebrow:
      en: Observability and security
      zh: Observability 与安全
    title:
      en: Trace LLM agents from prompts to system effects
      zh: 从 prompt 到系统影响追踪 LLM agent
    description:
      en: Stitch high-level agent operations to syscall, process, TLS, and network behavior so incidents can be inspected and policies can be enforced close to the runtime.
      zh: 将高层 agent 操作与 syscall、process、TLS 和 network behavior 关联起来，使事件可检查，并让 policy 更接近 runtime 执行。
    items:
      - title:
          en: AgentSight for zero-instrumentation agent tracing
          zh: AgentSight 用于零插桩 agent tracing
        description:
          en: Connects LLM calls, process trees, and kernel signals with low overhead.
          zh: 低开销关联 LLM 调用、进程树和内核信号。
        href: /GPTtrace/agentsight/
      - title:
          en: Kernel-enforced safety boundaries
          zh: 内核执行的安全边界
        description:
          en: Uses eBPF and LSM-style hooks for policy decisions that should not rely only on post-hoc summaries.
          zh: 对不能只依赖事后总结的 policy decision，使用 eBPF 和 LSM-style hook 执行。
  - key: gpu-performance
    eyebrow:
      en: GPU and inference performance
      zh: GPU 与推理性能
    title:
      en: Observe AI workloads without changing application code
      zh: 不修改应用代码观测 AI workload
    description:
      en: Start with uprobes on CUDA and userspace libraries, combine them with device metrics, then evaluate deeper device-resident paths when needed.
      zh: 从 CUDA 和 userspace library 的 uprobe 开始，结合设备指标，并在必要时评估更深的 device-resident 路径。
    items:
      - title:
          en: CUDA and GPU tracing tutorials
          zh: CUDA 与 GPU tracing 教程
        description:
          en: Practical eBPF tracing examples for CUDA operations and GPU-facing applications.
          zh: 面向 CUDA 操作和 GPU-facing 应用的 eBPF tracing 示例。
        href: /tutorials/47-cuda-events/
      - title:
          en: eGPU research path
          zh: eGPU 研究路径
        description:
          en: Offloads eBPF bytecode onto GPUs through PTX/SPIR-V injection and feeds into bpftime runtime work.
          zh: 通过 PTX/SPIR-V injection 将 eBPF bytecode 卸载到 GPU，并进入 bpftime runtime 工作线。
        href: https://dl.acm.org/doi/10.1145/3723851.3726984
  - key: data-path
    eyebrow:
      en: Kernel data paths
      zh: Kernel data paths
    title:
      en: Use eBPF as the sensing and pre-filtering layer for ML services
      zh: 用 eBPF 作为 ML service 的感知与预过滤层
    description:
      en: eBPF/XDP/TC can collect signals and filter traffic near the packet path while heavier inference remains in userspace or specialized hardware.
      zh: eBPF/XDP/TC 可以在 packet path 附近收集信号并过滤流量，同时将更重的推理留在 userspace 或专用硬件。
    items:
      - title:
          en: Intelligent traffic processing
          zh: 智能流量处理
        description:
          en: Use XDP/TC for fast filtering, steering, and telemetry before ML models make higher-level decisions.
          zh: 在 ML model 做高层决策前，用 XDP/TC 进行快速过滤、导流和 telemetry。
      - title:
          en: Tiny model and policy experiments
          zh: Tiny model 与 policy 实验
        description:
          en: Evaluate where verifier-friendly in-kernel decision logic helps and where userspace remains the right boundary.
          zh: 评估哪些 verifier-friendly 的内核决策逻辑有价值，哪些场景仍应留在 userspace。
  - key: synthesis
    eyebrow:
      en: Synthesis and verification
      zh: 合成与验证
    title:
      en: Generate useful eBPF programs without skipping correctness
      zh: 生成有用的 eBPF 程序，但不跳过正确性
    description:
      en: LLM-based eBPF generation needs examples, semantic checks, verifier awareness, and tests before it can become dependable system tooling.
      zh: 基于 LLM 的 eBPF 生成需要示例、语义检查、verifier awareness 和测试，才能成为可靠的系统工具。
    items:
      - title:
          en: GPTtrace and MCPtrace
          zh: GPTtrace 与 MCPtrace
        description:
          en: Turn natural-language tracing requests into inspectable eBPF workflows.
          zh: 将自然语言 tracing request 转换为可检查的 eBPF workflow。
        href: /GPTtrace/gpttrace/
      - title:
          en: Kgent / KEN
          zh: Kgent / KEN
        description:
          en: LLM-powered eBPF synthesis with symbolic checks and tests for more reliable generated programs.
          zh: 结合符号检查和测试的 LLM-powered eBPF synthesis，用于提升生成程序可靠性。
        href: https://dl.acm.org/doi/10.1145/3672197.3673434
