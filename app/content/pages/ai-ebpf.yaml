variant: ai-ebpf
title:
  en: AI × eBPF
  zh: AI 与 eBPF
description:
  en: eBPF-based tracing, observability, synthesis, and safety work for AI agents, LLM systems, and low-level runtime behavior.
  zh: 面向 AI agent、LLM systems 和底层 runtime behavior 的 eBPF tracing、observability、程序合成与安全工作。
summary:
  en: "The page follows the original direction of the AI × eBPF document: eBPF gives AI systems high-fidelity runtime context, while AI helps generate, verify, and operate eBPF programs and OS policies."
  zh: 这个页面保留原 AI × eBPF 文档的方向：eBPF 为 AI 系统提供高质量运行时上下文，同时 AI 帮助生成、验证和操作 eBPF 程序与 OS policies。
hero_image: /_content-assets/docs/blog/posts/imgs/arch.png
section_labels:
  directions:
    en: Two-way loop
    zh: 双向循环
  projects:
    en: Agent and tracing projects
    zh: Agent 与 tracing 项目
  use_cases:
    en: Use-case map
    zh: 用例地图
  references:
    en: Research and references
    zh: 研究与参考
directions:
  - key: ebpf-for-ai
    eyebrow:
      en: eBPF for AI
      zh: eBPF for AI
    title:
      en: Runtime context for AI and ML systems
      zh: 为 AI 和 ML 系统提供运行时上下文
    description:
      en: eBPF acts as a low-overhead sensor and enforcement layer for agents, inference services, GPU workflows, and network paths.
      zh: eBPF 可作为低开销的传感与执行层，服务于 agent、推理服务、GPU 工作流和网络路径。
    points:
      - label:
          en: Prompt-to-syscall correlation
          zh: Prompt 到 syscall 的关联
      - label:
          en: Zero-instrumentation LLM and CUDA tracing
          zh: 零插桩 LLM 与 CUDA tracing
      - label:
          en: Kernel-level policy and safety hooks
          zh: 内核级 policy 与安全 hook
  - key: ai-for-ebpf
    eyebrow:
      en: AI for eBPF
      zh: AI for eBPF
    title:
      en: Synthesis and verification for kernel extensions
      zh: 面向内核扩展的合成与验证
    description:
      en: LLMs can help generate tracing programs, search examples, check constraints, and lower the barrier to reliable eBPF development.
      zh: LLM 可以帮助生成 tracing 程序、检索示例、检查约束，并降低可靠 eBPF 开发的门槛。
    points:
      - label:
          en: Natural-language tracing workflows
          zh: 自然语言 tracing 工作流
      - label:
          en: Symbolic checks and verifier-aware generation
          zh: 符号检查与 verifier-aware 生成
      - label:
          en: Toward adaptive OS and runtime policies
          zh: 面向自适应 OS 与 runtime policies
