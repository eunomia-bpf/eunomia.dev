capabilities_title:
  en: What the lab builds
  zh: Lab 在构建什么
capabilities_intro:
  en: Eunomia is organized around production-grade runtime infrastructure, practical developer paths, and research on AI systems behavior.
  zh: Eunomia 围绕生产可用的 runtime infrastructure、实际开发路径，以及 AI systems behavior 研究组织。
capabilities:
  - key: runtime-extension
    eyebrow:
      en: Runtime extension
      zh: Runtime extension
    title:
      en: Extend applications without treating eBPF as kernel-only
      zh: 让 eBPF 不只服务于内核工作流
    description:
      en: bpftime and llvmbpf explore how eBPF can instrument, extend, and accelerate userspace systems with practical deployment constraints in mind.
      zh: bpftime 和 llvmbpf 探索如何在实际部署约束下，用 eBPF instrument、extend 和 accelerate userspace systems。
  - key: developer-path
    eyebrow:
      en: Developer path
      zh: Developer path
    title:
      en: Make eBPF easier to build, package, and teach
      zh: 降低 eBPF 构建、打包和教学门槛
    description:
      en: The toolchain, WebAssembly runtime support, and runnable tutorials form a practical path from first program to production-style deployment.
      zh: 工具链、WebAssembly runtime 支持和可运行教程组成从第一个程序到生产式部署的实践路径。
  - key: ai-systems
    eyebrow:
      en: AI systems
      zh: AI systems
    title:
      en: Observe and control agent behavior at system boundaries
      zh: 在系统边界观测并控制 agent 行为
    description:
      en: AgentSight, GPTtrace, MCPtrace, and ACRFence connect LLM activity to process, network, kernel, and checkpoint/restore behavior.
      zh: AgentSight、GPTtrace、MCPtrace 和 ACRFence 将 LLM 活动与进程、网络、内核以及 checkpoint/restore 行为关联起来。
projects_title:
  en: Project lines
  zh: 项目
