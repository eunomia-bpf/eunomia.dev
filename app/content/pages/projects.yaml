variant: project-index
title:
  en: Projects
  zh: 项目
description:
  en: Open-source eBPF infrastructure, developer tooling, AI agent systems, and public research resources from the Eunomia lab.
  zh: Eunomia lab 的开源 eBPF 基础设施、开发工具链、AI agent systems 和公开研究资源。
summary:
  en: "The project family is organized around a simple path: extend runtimes safely, make eBPF easier to build and ship, observe AI systems at runtime, and publish the material needed to reproduce the work."
  zh: 项目体系按一条清晰路径组织：安全扩展 runtime，降低 eBPF 构建和发布成本，观测 AI 系统运行时行为，并公开可复现的教程、文章与研究材料。
section_labels:
  featured:
    en: Featured systems
    zh: 重点系统
  groups:
    en: Project map
    zh: 项目地图
  group_count:
    en: project groups
    zh: 项目分组
  entry_count:
    en: entry points
    zh: 入口
featured_projects: [bpftime, agentsight, eunomia-bpf, wasm-bpf]
project_groups:
  - key: runtime
    title:
      en: Runtime infrastructure
      zh: Runtime 基础设施
    intro:
      en: Execution engines and extension paths for running eBPF in userspace, across application boundaries, and in GPU-related workflows.
      zh: 支持 eBPF 在 userspace、应用边界和 GPU 相关工作流中运行的执行引擎与扩展路径。
    project_keys: [bpftime, llvmbpf]
  - key: developer-tools
    title:
      en: Developer tooling
      zh: 开发工具链
    intro:
      en: Tooling for building, packaging, distributing, and sandboxing eBPF programs in practical deployment environments.
      zh: 面向实际部署环境，用于构建、打包、分发和沙箱化 eBPF 程序的工具链。
    project_keys: [eunomia-bpf, wasm-bpf]
  - key: ai-agents
    title:
      en: AI agent systems
      zh: AI Agent 系统
    intro:
      en: Observability, tracing, synthesis, and safety work for LLM applications and autonomous coding agents.
      zh: 面向 LLM 应用和自主编码 agent 的 observability、tracing、程序合成与安全研究。
    project_keys: [agentsight, GPTtrace, mcptrace, ACRFence]
  - key: resources
    title:
      en: Public resources
      zh: 公开资源
    intro:
      en: Tutorials, documentation, writing, and research artifacts for engineers and researchers building with eBPF.
      zh: 面向 eBPF 工程师和研究者的教程、文档、技术文章和研究材料。
    project_keys: [tutorials, docs, blog, papers]
projects:
  - key: bpftime
    title: bpftime
    tag:
      en: Runtime
      zh: Runtime
    href: /bpftime/
    image: /_content-assets/docs/bpftime/documents/bpftime.png
    image_alt: bpftime architecture
    description:
      en: A high-performance userspace eBPF runtime and extension framework for uprobes, USDT, syscall, XDP, GPU, and related workflows.
      zh: 面向 userspace 的高性能 eBPF runtime 和扩展框架，覆盖 uprobe、USDT、syscall、XDP、GPU 等工作流。
    links:
      - label:
          en: Docs
          zh: 文档
        href: /bpftime/
      - label:
          en: GitHub
          zh: GitHub
        href: https://github.com/eunomia-bpf/bpftime
      - label:
