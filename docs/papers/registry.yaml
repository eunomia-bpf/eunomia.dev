  - slug: actplane
    title: "ActPlane: Programmable OS-Level Policy Enforcement for Agent Harnesses"
    arxiv: "2606.25189"
    arxiv_version: v2
    arxiv_updated: 2026-06-30
    status: arXiv preprint
    artifact: https://github.com/eunomia-bpf/ActPlane
    pdf: actplane.pdf
    text: actplane.txt
    blog:
      en: blog/posts/actplane.md
      zh: blog/posts/actplane.zh.md
    related_blog:
      en: blog/posts/ebpf-ai-agent-policy-enforcement.md
      zh: blog/posts/ebpf-ai-agent-policy-enforcement.zh.md
    key_numbers:
      - value: "2,116 policy-relevant statements"
        condition: "empirical study corpus: 84 CLAUDE.md/AGENTS.md files from 64 repositories"
      - value: "64% of statements are policies, 36% are descriptions"
        condition: "manual classification of the 2,116-statement corpus"
      - value: "70.1% of repositories are majority-policy"
        condition: "per-repository share of policy statements in the corpus"
      - value: "83% of policies are system-observable"
        condition: "observability classification of policy statements"
      - value: "context tiers: 26.4% self-contained, 64.2% project-level, 9.4% task-level"
        condition: "context required to evaluate each policy"
      - value: "75.8% dangerous-command refusal (DCR)"
        condition: "vs 48.4% prompt filter, 45.3% tool regex, 48.9% FIDES-style, 53.7% kernel IFC without feedback; 190 traces, 38 rules"
      - value: "task recovery 97.7% with semantic feedback vs 31.4% without"
        condition: "feedback ablation: 86 vs 27 recovered tasks"
      - value: "607 policies compiled by a Codex agent at $0.028 average"
        condition: "vs roughly $11 estimated for manual authoring"
      - value: "1.9% end-to-end overhead; 6.5% at 32 rules; 8.4% at 100 rules"
        condition: "agent workload macrobenchmarks"
      - value: "74% harm prevention (78 of 106 unsafe outcomes)"
        condition: "OpenAgentSafety, 361 tasks"

