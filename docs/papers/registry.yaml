# Research paper registry
#
# Single source of truth for paper metadata across the site. Every public
# claim about a paper (title, venue, version, key numbers) should be taken
# from this file, and blog posts must cite paper numbers as recorded here,
# with their measurement conditions.
#
# Policy: only published papers or public arXiv versions enter docs/papers/.
# Papers under review must never appear in this repository in any form.
#
# `arxiv_version` pins the version the local pdf/text copies were taken from.
# When the weekly audit detects a new arXiv version, refresh the pdf/text
# pair, update the pin, and re-verify every key number cited on the site.

papers:
